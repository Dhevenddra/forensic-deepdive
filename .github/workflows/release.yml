name: release

# DEC-092: tag-triggered PyPI release via OIDC Trusted Publishing (no API tokens).
#
# One-time PyPI setup (you, on pypi.org → the forensic-deepdive project →
# Settings → Publishing → "Add a pending publisher"):
#   Owner:        Dhevenddra
#   Repository:   forensic-deepdive
#   Workflow:     release.yml
#   Environment:  pypi
# OIDC only works from THIS workflow file in this repo (reusable workflows are not
# trusted). After the pending publisher exists, pushing a `v*` tag publishes.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync (all extras)
        run: uv sync --all-extras
      - name: Test
        # The UNWIND batch-perf test is a wall-clock timing assertion that is flaky
        # under shared-runner load (passes in isolation) — deselected here, as locally.
        run: >-
          uv run pytest -q
          --deselect "tests/graph/test_batch_perf.py::test_unwind_beats_single_row_by_at_least_5x"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (OIDC Trusted Publishing)
        run: uv publish
